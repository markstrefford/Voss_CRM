<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { width: 380px; max-height: 500px; padding: 16px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; overflow-y: auto; }
    h2 { font-size: 16px; margin-bottom: 12px; }
    h3 { font-size: 14px; margin-bottom: 8px; color: #333; }
    .form-group { margin-bottom: 10px; }
    label { display: block; font-weight: 500; margin-bottom: 4px; font-size: 12px; color: #666; }
    input { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
    input:focus { outline: none; border-color: #0073b1; }
    button { width: 100%; padding: 10px; background: #0073b1; color: white; border: none; border-radius: 6px; font-size: 14px; font-weight: 500; cursor: pointer; }
    button:hover { background: #005a8c; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .status { margin-top: 8px; padding: 8px; border-radius: 6px; font-size: 12px; text-align: center; }
    .status.success { background: #e8f5e9; color: #2e7d32; }
    .status.error { background: #fbe9e7; color: #c62828; }
    .status.info { background: #e3f2fd; color: #1565c0; }
    .status.warning { background: #fff3e0; color: #e65100; }
    .logged-in { display: flex; align-items: center; justify-content: between; gap: 8px; margin-bottom: 12px; }
    .logged-in .user { font-weight: 500; flex: 1; }
    .logout-btn { width: auto; padding: 4px 12px; background: #f5f5f5; color: #333; font-size: 12px; }
    .logout-btn:hover { background: #e0e0e0; }
    #login-section, #main-section { display: none; }

    /* Engagement queue styles */
    .engagement-section { margin-top: 16px; border-top: 1px solid #eee; padding-top: 12px; }
    .engagement-list { max-height: 280px; overflow-y: auto; }
    .engagement-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px; border: 1px solid #eee; border-radius: 6px; margin-bottom: 6px; font-size: 12px; }
    .engagement-item:hover { background: #f9f9f9; }
    .engagement-item input[type="checkbox"] { margin-top: 2px; flex-shrink: 0; }
    .engagement-item .item-content { flex: 1; min-width: 0; }
    .engagement-item .item-name { font-weight: 600; color: #333; }
    .engagement-item .item-action { color: #666; }
    .engagement-item .item-text { color: #888; font-style: italic; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .badge-new { display: inline-block; padding: 1px 5px; background: #0073b1; color: white; font-size: 10px; font-weight: 600; border-radius: 3px; margin-left: 4px; }
    .badge-exists { display: inline-block; padding: 1px 5px; background: #e8f5e9; color: #2e7d32; font-size: 10px; font-weight: 600; border-radius: 3px; margin-left: 4px; }
    .btn-row { display: flex; gap: 8px; margin-top: 8px; }
    .btn-row button { flex: 1; padding: 8px; font-size: 12px; }
    .btn-secondary { background: #f5f5f5; color: #333; }
    .btn-secondary:hover { background: #e0e0e0; }
    .select-all-row { display: flex; align-items: center; gap: 6px; margin-bottom: 8px; font-size: 12px; color: #666; }
  </style>
</head>
<body>
  <div id="login-section">
    <h2>Voss Login</h2>
    <div class="form-group">
      <label>API URL</label>
      <input type="url" id="api-url" placeholder="https://your-backend.onrender.com">
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="username" placeholder="username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="password">
    </div>
    <button id="login-btn">Login</button>
    <div id="login-status" class="status" style="display:none;"></div>
  </div>

  <div id="main-section">
    <div class="logged-in">
      <span class="user" id="display-user"></span>
      <button class="logout-btn" id="logout-btn">Logout</button>
    </div>
    <div id="capture-status" class="status info">Navigate to a LinkedIn profile to capture</div>

    <div id="engagement-section" class="engagement-section" style="display:none;">
      <h3 id="engagement-title">Engagement Capture</h3>
      <div id="engagement-warning" class="status warning" style="display:none;"></div>

      <div class="select-all-row">
        <input type="checkbox" id="select-all">
        <label for="select-all" style="margin:0; display:inline;">Select all</label>
        <span id="engagement-count" style="margin-left:auto;"></span>
      </div>

      <div id="engagement-list" class="engagement-list"></div>

      <div class="btn-row">
        <button id="capture-selected-btn" class="btn-secondary" disabled>Capture Selected</button>
        <button id="capture-all-btn">Capture All</button>
      </div>

      <div id="capture-result" class="status" style="display:none;"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
